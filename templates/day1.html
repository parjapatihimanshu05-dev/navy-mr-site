let score = 0;
let answered = 0;

const quiz = document.getElementById("quiz");

questions.forEach((item,i)=>{
let div = document.createElement("div");
div.className="question";

let html = `<b>${item.q}</b>`;

item.options.forEach((opt,j)=>{
html += `<div class="option" onclick="check(this,${i},${j})">${opt}</div>`;
});

html += `<div id="res-${i}"></div>`;
div.innerHTML = html;
quiz.appendChild(div);
});

function check(el,q,sel){
let correct = questions[q].answer;
let opts = el.parentElement.querySelectorAll(".option");
let res = document.getElementById("res-"+q);

if(res.innerHTML!=="") return;

answered++;

if(sel===correct){
el.classList.add("correct");
res.innerHTML="✅ Correct / सही";
score++;
}else{
el.classList.add("wrong");
opts[correct].classList.add("correct");
res.innerHTML="❌ Wrong / गलत";
}

document.getElementById("score").innerHTML =
`Score: ${score} / ${answered}`;
}
