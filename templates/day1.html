<style>

body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;

    background-size: 400% 400%;
    animation: gradientBG 12s ease infinite;
}

/* 🌈 Background Animation */
@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

h1 {
    text-align: center;
    color: white;
    letter-spacing: 1px;
}

/* 🔴 Logout Button */
#logout {
    float: right;
    margin: 10px;
    padding: 10px 15px;
    background: linear-gradient(45deg,#ff4b5c,#ff6b6b);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}
#logout:hover {
    transform: scale(1.05);
}

/* 📦 Quiz Container */
#quiz {
    max-width: 900px;
    margin: 40px auto;
}

/* 💎 Glass Card */
.question {
    padding: 25px;
    margin: 20px 0;
    border-radius: 18px;

    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);

    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);

    animation: fadeIn 0.5s ease;
}

/* ✨ Fade Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

/* 🎯 Options */
.option {
    display: block;
    padding: 14px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;

    background: rgba(255,255,255,0.9);
    color: black;

    transition: all 0.25s ease;
}

/* Hover Effect */
.option:hover {
    transform: translateX(5px);
    background: #e9ecef;
}

/* Selected / Correct / Wrong */
.correct {
    background: #51cf66 !important;
    color: white;
}

.wrong {
    background: #ff6b6b !important;
    color: white;
}

/* 🔘 Buttons */
button {
    padding: 10px 18px;
    margin: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;

    background: linear-gradient(45deg,#4facfe,#00f2fe);
    color: white;
    font-weight: bold;

    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* 📊 Score */
#score {
    text-align: center;
    font-size: 24px;
    margin-top: 20px;
    color: white;
    font-weight: bold;
}

/* 📱 Responsive */
@media(max-width:600px){
    .question { padding:15px; }
    button { width:100%; }
}

</style>
</head>

// Start from Flask score
let score = {{ score }};
let current = 0;
let answered = false;

// Load saved progress
if(localStorage.getItem("current")){
    current = parseInt(localStorage.getItem("current"));
}
if(localStorage.getItem("score")){
    score = parseInt(localStorage.getItem("score"));
}

const quiz = document.getElementById("quiz");
const scoreBox = document.getElementById("score");

// 🎯 Load question
function loadQuestion(){
    answered = false;
    let q = questions[current];

    quiz.innerHTML = `
        <div class="question">
            <h3>Question ${current+1} / ${questions.length}</h3>
            <p>${q.q}</p>

            ${q.options.map((opt,i)=>`
                <label class="option">
                    <input type="radio" name="option" value="${i}">
                    ${opt}
                </label>
            `).join("")}

            <button onclick="submitAnswer()">Submit Answer</button>

            <div id="result" style="margin-top:10px;font-weight:bold;"></div>

            <div style="margin-top:15px;">
                <button onclick="prev()">⬅ Prev</button>
                <button onclick="next()">Next ➡</button>
            </div>
        </div>
    `;

    scoreBox.innerHTML = `Score: ${score}`;
document.getElementById("progress").style.width =
((current+1)/questions.length)*100 + "%";
}

// 🎯 Submit Answer
function submitAnswer(){
    if(answered) return;

    let selected = document.querySelector('input[name="option"]:checked');
    if(!selected){
        alert("Please select an option");
        return;
    }

    let selectedVal = parseInt(selected.value);
    let correct = questions[current].answer;
    let options = document.querySelectorAll(".option");
    let resultBox = document.getElementById("result");

    answered = true;

    if(selectedVal === correct){
        options[selectedVal].classList.add("correct");
        resultBox.innerHTML = "✅ Correct";
        score++;
    } else {
        options[selectedVal].classList.add("wrong");
        options[correct].classList.add("correct");
        resultBox.innerHTML = "❌ Wrong";
    }

    localStorage.setItem("score", score);
    localStorage.setItem("current", current);

    scoreBox.innerHTML = `Score: ${score}`;

    // auto next after 1 sec
    setTimeout(() => {
        next();
    }, 1000);
}

// 🎯 Next
function next(){
    if(current < questions.length - 1){
        current++;
        localStorage.setItem("current", current);
        loadQuestion();
    } else {
        finish();
    }
}

// 🎯 Previous
function prev(){
    if(current > 0){
        current--;
        localStorage.setItem("current", current);
        loadQuestion();
    }
}

// 🎯 Jump to question
function jumpTo(){
    let val = document.getElementById("jump").value;
    if(val >= 1 && val <= questions.length){
        current = val - 1;
        loadQuestion();
    }
}

// 🎯 Finish
function finish(){
    quiz.innerHTML = `
        <h2 style="color:white;text-align:center;">🎉 Quiz Completed</h2>
        <h3 style="color:white;text-align:center;">Your Score: ${score} / ${questions.length}</h3>
        <div style="text-align:center;">
            <button onclick="restart()">Restart</button>
        </div>
    `;

    navigator.sendBeacon("/update_score", new URLSearchParams({
        score: score
    }));

    localStorage.clear();
}

// 🎯 Restart
function restart(){
    score = 0;
    current = 0;
    localStorage.clear();
    loadQuestion();
}

// Start
loadQuestion();

</script>
